# Local stack: API + Postgres (linux/amd64 for production parity)
services:
  postgres:
    image: postgres:18-alpine
    platform: linux/amd64
    container_name: btw-template-pdf-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-btw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btw}
      POSTGRES_DB: ${POSTGRES_DB:-btw_template_pdf}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (not .../data)
      - btw_template_pdf_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btw} -d ${POSTGRES_DB:-btw_template_pdf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${DOCKER_IMAGE:-ingluigii/btw-template-pdf:latest}
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: btw-template-pdf-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TemplatePdf: Host=postgres;Port=5432;Database=${POSTGRES_DB:-btw_template_pdf};Username=${POSTGRES_USER:-btw};Password=${POSTGRES_PASSWORD:-btw}
      FeDian__BaseUrl: ${FEDIAN_BASE_URL:-}
      FeDian__Environment: ${FEDIAN_ENVIRONMENT:-UAT}
      FeDian__AuthKey: ${FEDIAN_AUTH_KEY:-}
      FeDian__AllowStubFallback: ${FEDIAN_ALLOW_STUB_FALLBACK:-true}
      FeDian__TimeoutSeconds: ${FEDIAN_TIMEOUT_SECONDS:-60}
      Swagger__Enabled: ${SWAGGER_ENABLED:-true}
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  btw_template_pdf_pg:
